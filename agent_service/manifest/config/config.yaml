# Gin HTTP 服务配置。
server:
  address: ":6872"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# 应用日志配置。
logger:
  level: "all"
  stdout: true

think_chat_model:
  api_key: ""
  base_url: ""
  model: ""

quick_chat_model:
  api_key: ""
  base_url: ""
  model: ""

embedding_model:
  api_key: ""
  model: "text-embedding-v4"

agent_service_port: 6872
jwt_secret: "monitor-system-dev-secret"
api_gateway_base_url: "http://127.0.0.1:8080"
milvus_addr: "127.0.0.1:19530"
docs_dir: "./docs"

memory:
  # 长期记忆默认关闭，避免在未配置治理接口前自动沉淀生产上下文。
  long_term_enabled: false
  write_enabled: false
  recall_enabled: false
  recent_window: 6
  summary_window: 12
  recall_limit: 5
  token_budget: 1200
