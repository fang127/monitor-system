name: monitor_system
services:
  mysql:
    image: mysql:latest
    container_name: monitor_system_mysql
    restart: unless-stopped # 容器重启策略：除非手动停止，否则总是重启
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-monitor-system}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - "../manager/sql table/init_server_performance.sql:/docker-entrypoint-initdb.d/init_server_performance.sql:ro"
    healthcheck:
      # 健康检查配置，确保 MySQL 服务可用
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ] # 使用环境变量 MYSQL_ROOT_PASSWORD 进行健康检查
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: monitor_system_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: monitor_system_milvus_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - milvus_etcd_data:/etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: monitor_system_milvus_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - milvus_minio_data:/minio_data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: monitor_system_milvus
    restart: unless-stopped
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - milvus-minio
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  milvus-attu:
    image: zilliz/attu:v2.6
    container_name: monitor_system_milvus_attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8000:3000"
    depends_on:
      - milvus

  agent_service:
    build:
      context: ../agent_service
      dockerfile: manifest/docker/Dockerfile
    container_name: monitor_system_agent_service
    restart: unless-stopped
    environment:
      AGENT_SERVICE_PORT: ${AGENT_SERVICE_PORT:-6872}
      API_GATEWAY_BASE_URL: ${DOCKER_API_GATEWAY_BASE_URL:-http://api_gateway:8080}
      MILVUS_ADDR: ${DOCKER_MILVUS_ADDR:-milvus:19530}
      AGENT_DOCS_DIR: /app/docs
      AGENT_THINK_API_KEY: ${AGENT_THINK_API_KEY:-}
      AGENT_THINK_BASE_URL: ${AGENT_THINK_BASE_URL:-}
      AGENT_THINK_MODEL: ${AGENT_THINK_MODEL:-}
      AGENT_QUICK_API_KEY: ${AGENT_QUICK_API_KEY:-}
      AGENT_QUICK_BASE_URL: ${AGENT_QUICK_BASE_URL:-}
      AGENT_QUICK_MODEL: ${AGENT_QUICK_MODEL:-}
      AGENT_EMBEDDING_API_KEY: ${AGENT_EMBEDDING_API_KEY:-}
      AGENT_EMBEDDING_MODEL: ${AGENT_EMBEDDING_MODEL:-text-embedding-v4}
    ports:
      - "${AGENT_SERVICE_PORT:-6872}:${AGENT_SERVICE_PORT:-6872}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - milvus

  api_gateway:
    build:
      context: ../api_gateway
    container_name: monitor_system_api_gateway
    restart: unless-stopped
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT:-8080}
      API_GATEWAY_VERSION: ${API_GATEWAY_VERSION:-v0.1.0}
      GIN_MODE: ${GIN_MODE:-debug}
      MANAGER_GRPC_ADDR: ${DOCKER_MANAGER_GRPC_ADDR:-host.docker.internal:50051}
      MANAGER_GRPC_TIMEOUT: ${MANAGER_GRPC_TIMEOUT:-5s}
    ports:
      - "${API_GATEWAY_PORT:-8080}:${API_GATEWAY_PORT:-8080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ../web
    container_name: monitor_system_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api_gateway
      - agent_service

volumes:
  mysql_data:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:
