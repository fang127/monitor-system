services:
  mysql:
    image: mysql:8.0
    container_name: monitor-system-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-monitor-system}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - "../manager/sql table/init_server_performance.sql:/docker-entrypoint-initdb.d/init_server_performance.sql:ro"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: monitor-system-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
