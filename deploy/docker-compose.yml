name: monitor-system
services:
  mysql:
    image: mysql:latest
    container_name: monitor-system-mysql
    restart: unless-stopped # 容器重启策略：除非手动停止，否则总是重启
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-monitor-system}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - "../manager/sql table/init_server_performance.sql:/docker-entrypoint-initdb.d/init_server_performance.sql:ro"
    healthcheck:
      # 健康检查配置，确保 MySQL 服务可用
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ] # 使用环境变量 MYSQL_ROOT_PASSWORD 进行健康检查
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: monitor-system-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
