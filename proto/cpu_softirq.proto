syntax = "proto3";
package monitor.proto;

// SoftIrq represents the soft interrupt statistics for a CPU.
message SoftIrq {
    string cpu = 1; // CPU identifier, example: "cpu0"
    float hi = 2; // High priority softirq time percentage
    float timer = 3; // Timer softirq time percentage
    float net_tx = 4; // Network transmit softirq time percentage
    float net_rx = 5; // Network receive softirq time percentage
    float block = 6; // Block I/O softirq time percentage
    float irq_poll = 7; // IRQ polling softirq time percentage
    float tasklet = 8; // Tasklet softirq time percentage
    float sched = 9; // Scheduler softirq time percentage
    float hrtimer = 10; // High-resolution timer softirq time percentage
    float rcu = 11; // RCU softirq time percentage
}