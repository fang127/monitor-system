syntax = "proto3";
package monitor.proto;

// SoftIrq 表示单个 CPU 的软中断统计。
message SoftIrq {
    string cpu = 1; // CPU 标识，例如 "cpu0"
    float hi = 2; // 高优先级软中断时间占比
    float timer = 3; // 定时器软中断时间占比
    float net_tx = 4; // 网络发送软中断时间占比
    float net_rx = 5; // 网络接收软中断时间占比
    float block = 6; // 块设备 I/O 软中断时间占比
    float irq_poll = 7; // 中断轮询软中断时间占比
    float tasklet = 8; // tasklet 软中断时间占比
    float sched = 9; // 调度软中断时间占比
    float hrtimer = 10; // 高精度定时器软中断时间占比
    float rcu = 11; // RCU 软中断时间占比
}
