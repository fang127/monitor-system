syntax = "proto3";
package monitor.proto;

// CPU usage statistics
message CpuStat{
    string cpu_name = 1; // e.g., "cpu0", "cpu1", or "all"
    float cpu_percent = 2; // overall CPU usage percentage
    float usr_percent = 3; // user mode CPU usage percentage
    float system_percent = 4; // system mode CPU usage percentage
    float nice_percent = 5; // nice mode CPU usage percentage
    float idle_percent = 6; // idle CPU percentage
    float io_wait_percent = 7; // I/O wait CPU percentage
    float irq_percent = 8; // IRQ CPU usage percentage
    float soft_irq_percent = 9; // soft IRQ CPU usage percentage
}