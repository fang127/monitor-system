syntax = "proto3";
package monitor.proto;

// Memory Information
message MemInfo {
    float total = 1; // total in MB
    float free = 2; // free in MB
    float avail= 3; // available in MB
    float buffers = 4; // buffers in MB
    float cached = 5; // cached in MB
    float swap_cached = 6; // swap cached in MB
    float active = 7; // active in MB
    float inactive = 8; // inactive in MB
    float active_anon = 9; // active anon in MB
    float inactive_anon = 10; // inactive anon in MB
    float active_file = 11; // active file in MB
    float inactive_file = 12; // inactive file in MB
    float dirty = 13; // dirty in MB
    float writeback = 14; // writeback in MB
    float anon_pages = 15; // anon pages in MB
    float mapped = 16; // mapped in MB
    float kReclaimable = 17; // kernel reclaimable in MB
    float sReclaimable = 18; // slab reclaimable in MB
    float sUnreclaim = 19; // slab unreclaimable in MB
    float used_percent = 31; // used percent %
}